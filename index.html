<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>OpenQR</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
        <style>
            /* Custom scrollbar & minor tweaks */
            ::-webkit-scrollbar {
                width: 8px;
            }
            ::-webkit-scrollbar-track {
                background: #f1f1f1;
            }
            ::-webkit-scrollbar-thumb {
                background: #cbd5e1;
                border-radius: 4px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: #94a3b8;
            }
            .tab-btn.active {
                border-bottom: 2px solid #3b82f6;
                color: #3b82f6;
                font-weight: 600;
            }
            input[type="color"] {
                padding: 0;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
            input[type="color"]::-webkit-color-swatch-wrapper {
                padding: 0;
            }
            input[type="color"]::-webkit-color-swatch {
                border: 1px solid #e2e8f0;
                border-radius: 4px;
            }

            /* Force QR code to stay within container boundaries */
            #qr-container canvas,
            #qr-container svg {
                width: 100% !important;
                max-width: 300px !important;
                height: auto !important;
                border-radius: 0.5rem;
            }
        </style>
    </head>
    <body class="bg-gray-50 text-gray-800 font-sans min-h-screen">
        <div class="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8">
            <header
                class="mb-8 text-center sm:text-left flex justify-between items-center flex-wrap gap-4"
            >
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">
                        QR Code Generator
                    </h1>
                    <p class="text-gray-500 text-sm mt-1">
                        Create custom QR codes with logos, colors, gradients,
                        and shapes.
                    </p>
                </div>
                <button
                    id="resetBtn"
                    class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition text-sm font-medium shadow-sm"
                >
                    ↺ Reset All Settings
                </button>
            </header>

            <div class="flex flex-col lg:flex-row gap-8">
                <div class="w-full lg:w-2/3 space-y-6">
                    <div
                        class="bg-white p-6 rounded-xl shadow-sm border border-gray-100"
                    >
                        <h2 class="text-lg font-semibold mb-4 text-gray-800">
                            1. Enter Content
                        </h2>

                        <div
                            class="flex overflow-x-auto border-b border-gray-200 mb-4 no-scrollbar"
                        >
                            <button
                                class="tab-btn active px-4 py-2 text-sm text-gray-600 whitespace-nowrap"
                                data-type="url"
                            >
                                URL
                            </button>
                            <button
                                class="tab-btn px-4 py-2 text-sm text-gray-600 whitespace-nowrap"
                                data-type="text"
                            >
                                Text
                            </button>
                            <button
                                class="tab-btn px-4 py-2 text-sm text-gray-600 whitespace-nowrap"
                                data-type="email"
                            >
                                Email
                            </button>
                            <button
                                class="tab-btn px-4 py-2 text-sm text-gray-600 whitespace-nowrap"
                                data-type="phone"
                            >
                                Phone
                            </button>
                            <button
                                class="tab-btn px-4 py-2 text-sm text-gray-600 whitespace-nowrap"
                                data-type="sms"
                            >
                                SMS
                            </button>
                            <button
                                class="tab-btn px-4 py-2 text-sm text-gray-600 whitespace-nowrap"
                                data-type="wifi"
                            >
                                WiFi
                            </button>
                            <button
                                class="tab-btn px-4 py-2 text-sm text-gray-600 whitespace-nowrap"
                                data-type="vcard"
                            >
                                vCard
                            </button>
                        </div>

                        <div id="panel-url" class="input-panel">
                            <input
                                type="url"
                                id="data-url"
                                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                placeholder="https://example.com"
                                value="https://example.com"
                            />
                        </div>

                        <div id="panel-text" class="input-panel hidden">
                            <textarea
                                id="data-text"
                                rows="3"
                                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                placeholder="Enter your text here..."
                            ></textarea>
                        </div>

                        <div
                            id="panel-email"
                            class="input-panel hidden space-y-3"
                        >
                            <input
                                type="email"
                                id="data-email-to"
                                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Email Address"
                            />
                            <input
                                type="text"
                                id="data-email-sub"
                                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Subject"
                            />
                            <textarea
                                id="data-email-body"
                                rows="2"
                                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Message"
                            ></textarea>
                        </div>

                        <div id="panel-phone" class="input-panel hidden">
                            <input
                                type="tel"
                                id="data-phone"
                                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="+1 234 567 8900"
                            />
                        </div>

                        <div
                            id="panel-sms"
                            class="input-panel hidden space-y-3"
                        >
                            <input
                                type="tel"
                                id="data-sms-phone"
                                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Phone Number"
                            />
                            <textarea
                                id="data-sms-msg"
                                rows="2"
                                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Message"
                            ></textarea>
                        </div>

                        <div
                            id="panel-wifi"
                            class="input-panel hidden space-y-3"
                        >
                            <input
                                type="text"
                                id="data-wifi-ssid"
                                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Network Name (SSID)"
                            />
                            <input
                                type="text"
                                id="data-wifi-pass"
                                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Password"
                            />
                            <select
                                id="data-wifi-enc"
                                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                                <option value="WPA">WPA/WPA2</option>
                                <option value="WEP">WEP</option>
                                <option value="nopass">No Password</option>
                            </select>
                        </div>

                        <div
                            id="panel-vcard"
                            class="input-panel hidden space-y-3"
                        >
                            <div class="grid grid-cols-2 gap-3">
                                <input
                                    type="text"
                                    id="data-vcard-fname"
                                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="First Name"
                                />
                                <input
                                    type="text"
                                    id="data-vcard-lname"
                                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="Last Name"
                                />
                            </div>
                            <input
                                type="text"
                                id="data-vcard-org"
                                class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Company"
                            />
                            <div class="grid grid-cols-2 gap-3">
                                <input
                                    type="tel"
                                    id="data-vcard-phone"
                                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="Phone"
                                />
                                <input
                                    type="email"
                                    id="data-vcard-email"
                                    class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="Email"
                                />
                            </div>
                        </div>
                    </div>

                    <div
                        class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-6"
                    >
                        <h2 class="text-lg font-semibold text-gray-800">
                            2. Customize Design
                        </h2>

                        <div
                            class="grid grid-cols-1 md:grid-cols-2 gap-6 border-b border-gray-100 pb-6"
                        >
                            <div>
                                <label
                                    class="block text-sm font-medium text-gray-700 mb-2"
                                    >Foreground Color</label
                                >

                                <div class="flex space-x-4 mb-3">
                                    <label
                                        class="flex items-center space-x-1 cursor-pointer"
                                    >
                                        <input
                                            type="radio"
                                            name="fg-type"
                                            value="solid"
                                            checked
                                            class="text-blue-600 focus:ring-blue-500"
                                        />
                                        <span class="text-sm text-gray-600"
                                            >Solid</span
                                        >
                                    </label>
                                    <label
                                        class="flex items-center space-x-1 cursor-pointer"
                                    >
                                        <input
                                            type="radio"
                                            name="fg-type"
                                            value="gradient"
                                            class="text-blue-600 focus:ring-blue-500"
                                        />
                                        <span class="text-sm text-gray-600"
                                            >Gradient</span
                                        >
                                    </label>
                                </div>

                                <div
                                    id="fg-solid-panel"
                                    class="flex items-center space-x-3"
                                >
                                    <input
                                        type="color"
                                        id="color-fg"
                                        value="#000000"
                                        class="w-10 h-10"
                                    />
                                    <span
                                        class="text-sm text-gray-500"
                                        id="color-fg-text"
                                        >#000000</span
                                    >
                                </div>

                                <div
                                    id="fg-gradient-panel"
                                    class="hidden space-y-3 p-3 bg-gray-50 rounded-lg border border-gray-200"
                                >
                                    <div
                                        class="flex items-center justify-between space-x-2"
                                    >
                                        <div
                                            class="flex items-center space-x-2"
                                        >
                                            <input
                                                type="color"
                                                id="color-grad-1"
                                                value="#3b82f6"
                                                class="w-8 h-8"
                                            />
                                        </div>
                                        <span class="text-xs text-gray-400"
                                            >to</span
                                        >
                                        <div
                                            class="flex items-center space-x-2"
                                        >
                                            <input
                                                type="color"
                                                id="color-grad-2"
                                                value="#8b5cf6"
                                                class="w-8 h-8"
                                            />
                                        </div>
                                    </div>

                                    <select
                                        id="grad-type"
                                        class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                                    >
                                        <option value="linear">
                                            Linear Gradient
                                        </option>
                                        <option value="radial">
                                            Radial Gradient
                                        </option>
                                    </select>

                                    <div id="grad-rotation-container">
                                        <label
                                            class="block text-xs text-gray-600 mb-1"
                                            >Rotation:
                                            <span id="grad-rot-val">45</span
                                            >°</label
                                        >
                                        <input
                                            type="range"
                                            id="grad-rotation"
                                            min="0"
                                            max="360"
                                            value="45"
                                            class="w-full h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer"
                                        />
                                    </div>
                                </div>
                            </div>

                            <div>
                                <label
                                    class="block text-sm font-medium text-gray-700 mb-2"
                                    >Background Color</label
                                >
                                <div
                                    class="flex items-center space-x-3 mt-8 md:mt-0"
                                >
                                    <input
                                        type="color"
                                        id="color-bg"
                                        value="#ffffff"
                                        class="w-10 h-10"
                                    />
                                    <span
                                        class="text-sm text-gray-500"
                                        id="color-bg-text"
                                        >#ffffff</span
                                    >
                                    <label
                                        class="flex items-center space-x-2 ml-4"
                                    >
                                        <input
                                            type="checkbox"
                                            id="bg-transparent"
                                            class="rounded text-blue-600 focus:ring-blue-500"
                                        />
                                        <span class="text-sm text-gray-600"
                                            >Transparent</span
                                        >
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div
                            class="grid grid-cols-1 sm:grid-cols-3 gap-4 border-b border-gray-100 pb-6"
                        >
                            <div>
                                <label
                                    class="block text-sm font-medium text-gray-700 mb-2"
                                    >Pattern Style</label
                                >
                                <select
                                    id="style-dots"
                                    class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                >
                                    <option value="square">Square</option>
                                    <option value="dots">Dots</option>
                                    <option value="rounded">Rounded</option>
                                    <option value="extra-rounded">
                                        Extra Rounded
                                    </option>
                                    <option value="classy">Classy</option>
                                    <option value="classy-rounded">
                                        Classy Rounded
                                    </option>
                                </select>
                            </div>
                            <div>
                                <label
                                    class="block text-sm font-medium text-gray-700 mb-2"
                                    >Corner Square</label
                                >
                                <select
                                    id="style-corners"
                                    class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                >
                                    <option value="square">Square</option>
                                    <option value="dot">Dot</option>
                                    <option value="extra-rounded">
                                        Extra Rounded
                                    </option>
                                </select>
                            </div>
                            <div>
                                <label
                                    class="block text-sm font-medium text-gray-700 mb-2"
                                    >Corner Dot</label
                                >
                                <select
                                    id="style-corners-dot"
                                    class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                >
                                    <option value="square">Square</option>
                                    <option value="dot">Dot</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label
                                class="block text-sm font-medium text-gray-700 mb-2"
                                >Add Logo</label
                            >
                            <div class="flex items-center space-x-4">
                                <input
                                    type="file"
                                    id="logo-input"
                                    accept="image/*"
                                    class="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"
                                />
                                <button
                                    id="logo-remove"
                                    class="hidden text-sm text-red-500 hover:text-red-700 font-medium"
                                >
                                    Remove Logo
                                </button>
                            </div>

                            <div
                                class="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-4 bg-gray-50 p-4 rounded-lg border border-gray-200"
                            >
                                <div>
                                    <label
                                        class="block text-sm text-gray-700 mb-1 font-medium"
                                        >Logo Size:
                                        <span
                                            id="logo-size-val"
                                            class="text-blue-600 font-semibold"
                                            >0.4</span
                                        ></label
                                    >
                                    <input
                                        type="range"
                                        id="logo-size"
                                        min="0.1"
                                        max="0.7"
                                        step="0.1"
                                        value="0.4"
                                        class="w-full h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer"
                                    />
                                </div>
                                <div>
                                    <label
                                        class="block text-sm text-gray-700 mb-1 font-medium"
                                        >Border/Margin:
                                        <span
                                            id="logo-margin-val"
                                            class="text-blue-600 font-semibold"
                                            >5</span
                                        >px</label
                                    >
                                    <input
                                        type="range"
                                        id="logo-margin"
                                        min="0"
                                        max="20"
                                        step="1"
                                        value="5"
                                        class="w-full h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer"
                                    />
                                </div>
                                <div class="sm:col-span-2 pt-2">
                                    <label
                                        class="flex items-center space-x-2 cursor-pointer"
                                    >
                                        <input
                                            type="checkbox"
                                            id="hide-bg-dots"
                                            checked
                                            class="rounded w-4 h-4 text-blue-600 focus:ring-blue-500 cursor-pointer border-gray-300"
                                        />
                                        <span
                                            class="text-sm text-gray-700 font-medium"
                                            >Clear QR dots behind logo (prevents
                                            overlapping)</span
                                        >
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="w-full lg:w-1/3">
                    <div
                        class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 sticky top-6"
                    >
                        <h2
                            class="text-lg font-semibold mb-4 text-gray-800 text-center"
                        >
                            Live Preview
                        </h2>

                        <div
                            class="flex justify-center items-center bg-gray-50 rounded-lg p-4 border border-gray-200 min-h-[300px]"
                            id="qr-container"
                        ></div>

                        <div class="mt-6 space-y-4">
                            <div>
                                <label
                                    class="block text-sm font-medium text-gray-700 mb-1"
                                    >Resolution (px):
                                    <span id="res-val">1024</span>x<span
                                        id="res-val2"
                                        >1024</span
                                    ></label
                                >
                                <input
                                    type="range"
                                    id="export-size"
                                    min="256"
                                    max="2048"
                                    step="256"
                                    value="1024"
                                    class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                />
                            </div>

                            <div class="flex space-x-2">
                                <select
                                    id="export-format"
                                    class="w-1/3 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium"
                                >
                                    <option value="png">PNG</option>
                                    <option value="svg">SVG</option>
                                    <option value="jpeg">JPG</option>
                                </select>
                                <button
                                    id="download-btn"
                                    class="w-2/3 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg shadow-md transition duration-200 flex justify-center items-center"
                                >
                                    Download QR
                                </button>
                            </div>
                            <p
                                id="error-msg"
                                class="text-xs text-red-500 text-center mt-2 hidden"
                            >
                                Please enter valid data to generate.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // Global State & Instance
            let currentType = "url";
            let logoImage = null;
            let qrCode = null;

            // Configuration Object for qr-code-styling
            const qrConfig = {
                width: 1024,
                height: 1024,
                data: "https://example.com",
                margin: 10,
                qrOptions: {
                    typeNumber: 0,
                    mode: "Byte",
                    errorCorrectionLevel: "H",
                },
                imageOptions: {
                    hideBackgroundDots: true,
                    imageSize: 0.4,
                    margin: 5,
                    crossOrigin: "anonymous",
                },
                dotsOptions: { color: "#000000", type: "square" },
                backgroundOptions: { color: "#ffffff" },
                image: "",
                cornersSquareOptions: { color: "#000000", type: "square" },
                cornersDotOptions: { color: "#000000", type: "square" },
            };

            // DOM Elements
            const qrContainer = document.getElementById("qr-container");
            const downloadBtn = document.getElementById("download-btn");
            const errorMsg = document.getElementById("error-msg");

            // Initialize QR
            function initQR() {
                qrCode = new QRCodeStyling(qrConfig);
                qrCode.append(qrContainer);
            }

            // Format Builders
            function buildDataString() {
                let data = "";
                switch (currentType) {
                    case "url":
                        data = document.getElementById("data-url").value.trim();
                        break;
                    case "text":
                        data = document
                            .getElementById("data-text")
                            .value.trim();
                        break;
                    case "email":
                        const to = document
                            .getElementById("data-email-to")
                            .value.trim();
                        const sub = document
                            .getElementById("data-email-sub")
                            .value.trim();
                        const body = document
                            .getElementById("data-email-body")
                            .value.trim();
                        if (to)
                            data = `mailto:${to}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
                        break;
                    case "phone":
                        const phone = document
                            .getElementById("data-phone")
                            .value.trim();
                        if (phone) data = `tel:${phone}`;
                        break;
                    case "sms":
                        const smsPhone = document
                            .getElementById("data-sms-phone")
                            .value.trim();
                        const smsMsg = document
                            .getElementById("data-sms-msg")
                            .value.trim();
                        if (smsPhone) data = `smsto:${smsPhone}:${smsMsg}`;
                        break;
                    case "wifi":
                        const ssid = document
                            .getElementById("data-wifi-ssid")
                            .value.trim();
                        const pass = document
                            .getElementById("data-wifi-pass")
                            .value.trim();
                        const enc =
                            document.getElementById("data-wifi-enc").value;
                        if (ssid) data = `WIFI:T:${enc};S:${ssid};P:${pass};;`;
                        break;
                    case "vcard":
                        const fn = document
                            .getElementById("data-vcard-fname")
                            .value.trim();
                        const ln = document
                            .getElementById("data-vcard-lname")
                            .value.trim();
                        const org = document
                            .getElementById("data-vcard-org")
                            .value.trim();
                        const vphone = document
                            .getElementById("data-vcard-phone")
                            .value.trim();
                        const vemail = document
                            .getElementById("data-vcard-email")
                            .value.trim();
                        if (fn || ln) {
                            data = `BEGIN:VCARD\nVERSION:3.0\nN:${ln};${fn};;;\nFN:${fn} ${ln}\nORG:${org}\nTEL;TYPE=CELL:${vphone}\nEMAIL:${vemail}\nEND:VCARD`;
                        }
                        break;
                }
                return data;
            }

            // Update Generator Function
            function updateQR() {
                const data = buildDataString();

                if (!data) {
                    downloadBtn.disabled = true;
                    downloadBtn.classList.add(
                        "opacity-50",
                        "cursor-not-allowed",
                    );
                    errorMsg.classList.remove("hidden");
                    return;
                } else {
                    downloadBtn.disabled = false;
                    downloadBtn.classList.remove(
                        "opacity-50",
                        "cursor-not-allowed",
                    );
                    errorMsg.classList.add("hidden");
                }

                // Foreground Options (Solid vs Gradient)
                const isGradient =
                    document.querySelector('input[name="fg-type"]:checked')
                        .value === "gradient";
                let fgColorConfig = {};

                if (!isGradient) {
                    // Solid Color Mode
                    const fgColor = document.getElementById("color-fg").value;
                    fgColorConfig = { color: fgColor };
                } else {
                    // Gradient Mode
                    const c1 = document.getElementById("color-grad-1").value;
                    const c2 = document.getElementById("color-grad-2").value;
                    const gType = document.getElementById("grad-type").value;
                    const rotDeg = parseInt(
                        document.getElementById("grad-rotation").value,
                    );
                    const rotRad = rotDeg * (Math.PI / 180); // convert to radians

                    fgColorConfig = {
                        gradient: {
                            type: gType,
                            rotation: rotRad,
                            colorStops: [
                                { offset: 0, color: c1 },
                                { offset: 1, color: c2 },
                            ],
                        },
                    };
                }

                // Read Background
                const bgColor = document.getElementById("bg-transparent")
                    .checked
                    ? "transparent"
                    : document.getElementById("color-bg").value;

                // Read Shapes
                const dotStyle = document.getElementById("style-dots").value;
                const cornerStyle =
                    document.getElementById("style-corners").value;
                const cornerDotStyle =
                    document.getElementById("style-corners-dot").value;

                // Read Logo Settings
                const logoSize = parseFloat(
                    document.getElementById("logo-size").value,
                );
                const logoMargin = parseInt(
                    document.getElementById("logo-margin").value,
                );
                const hideDots =
                    document.getElementById("hide-bg-dots").checked;

                // Apply Update
                qrCode.update({
                    data: data,
                    dotsOptions: { type: dotStyle, ...fgColorConfig },
                    cornersSquareOptions: {
                        type: cornerStyle,
                        ...fgColorConfig,
                    },
                    cornersDotOptions: {
                        type: cornerDotStyle,
                        ...fgColorConfig,
                    },
                    backgroundOptions: { color: bgColor },
                    image: logoImage,
                    imageOptions: {
                        hideBackgroundDots: hideDots,
                        imageSize: logoSize,
                        margin: logoMargin,
                    },
                });
            }

            // --- Event Listeners ---

            // Tabs Logic
            document.querySelectorAll(".tab-btn").forEach((btn) => {
                btn.addEventListener("click", (e) => {
                    document
                        .querySelectorAll(".tab-btn")
                        .forEach((b) => b.classList.remove("active"));
                    e.target.classList.add("active");

                    document
                        .querySelectorAll(".input-panel")
                        .forEach((p) => p.classList.add("hidden"));

                    currentType = e.target.getAttribute("data-type");
                    document
                        .getElementById(`panel-${currentType}`)
                        .classList.remove("hidden");

                    updateQR();
                });
            });

            // Color Mode Toggle (Solid vs Gradient)
            document
                .querySelectorAll('input[name="fg-type"]')
                .forEach((radio) => {
                    radio.addEventListener("change", (e) => {
                        if (e.target.value === "solid") {
                            document
                                .getElementById("fg-solid-panel")
                                .classList.remove("hidden");
                            document
                                .getElementById("fg-solid-panel")
                                .classList.add("flex");
                            document
                                .getElementById("fg-gradient-panel")
                                .classList.add("hidden");
                        } else {
                            document
                                .getElementById("fg-solid-panel")
                                .classList.add("hidden");
                            document
                                .getElementById("fg-solid-panel")
                                .classList.remove("flex");
                            document
                                .getElementById("fg-gradient-panel")
                                .classList.remove("hidden");
                        }
                        updateQR();
                    });
                });

            // Toggle Gradient Rotation based on Type
            document
                .getElementById("grad-type")
                .addEventListener("change", (e) => {
                    if (e.target.value === "radial") {
                        document
                            .getElementById("grad-rotation-container")
                            .classList.add("hidden");
                    } else {
                        document
                            .getElementById("grad-rotation-container")
                            .classList.remove("hidden");
                    }
                });

            // All Inputs mapped to Live Preview
            const inputsToWatch = [
                "data-url",
                "data-text",
                "data-email-to",
                "data-email-sub",
                "data-email-body",
                "data-phone",
                "data-sms-phone",
                "data-sms-msg",
                "data-wifi-ssid",
                "data-wifi-pass",
                "data-wifi-enc",
                "data-vcard-fname",
                "data-vcard-lname",
                "data-vcard-org",
                "data-vcard-phone",
                "data-vcard-email",
                "color-fg",
                "color-bg",
                "bg-transparent",
                "style-dots",
                "style-corners",
                "style-corners-dot",
                "logo-size",
                "logo-margin",
                "hide-bg-dots",
                "color-grad-1",
                "color-grad-2",
                "grad-type",
                "grad-rotation",
            ];

            inputsToWatch.forEach((id) => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener("input", () => {
                        // Update dynamic text values for sliders/colors
                        if (id === "color-fg")
                            document.getElementById("color-fg-text").innerText =
                                el.value;
                        if (id === "color-bg")
                            document.getElementById("color-bg-text").innerText =
                                el.value;
                        if (id === "logo-size")
                            document.getElementById("logo-size-val").innerText =
                                el.value;
                        if (id === "logo-margin")
                            document.getElementById(
                                "logo-margin-val",
                            ).innerText = el.value;
                        if (id === "grad-rotation")
                            document.getElementById("grad-rot-val").innerText =
                                el.value;

                        updateQR();
                    });
                }
            });

            // Logo Upload
            document
                .getElementById("logo-input")
                .addEventListener("change", function (e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function (event) {
                            logoImage = event.target.result;
                            document
                                .getElementById("logo-remove")
                                .classList.remove("hidden");
                            updateQR();
                        };
                        reader.readAsDataURL(file);
                    }
                });

            // Logo Remove
            document
                .getElementById("logo-remove")
                .addEventListener("click", function () {
                    logoImage = null;
                    document.getElementById("logo-input").value = "";
                    this.classList.add("hidden");
                    updateQR();
                });

            // Export Size Slider Visuals
            document
                .getElementById("export-size")
                .addEventListener("input", function (e) {
                    document.getElementById("res-val").innerText =
                        e.target.value;
                    document.getElementById("res-val2").innerText =
                        e.target.value;
                });

            // Download Action
            downloadBtn.addEventListener("click", () => {
                if (downloadBtn.disabled) return;

                const size = parseInt(
                    document.getElementById("export-size").value,
                );
                const ext = document.getElementById("export-format").value;

                qrCode.update({ width: size, height: size });

                qrCode
                    .download({ name: "custom-qr", extension: ext })
                    .then(() => {
                        qrCode.update({ width: 1024, height: 1024 });
                    });
            });

            // Reset Button
            document
                .getElementById("resetBtn")
                .addEventListener("click", () => {
                    if (
                        confirm(
                            "Are you sure you want to reset all settings to default?",
                        )
                    ) {
                        location.reload();
                    }
                });

            // Initialize on load
            window.addEventListener("DOMContentLoaded", () => {
                initQR();
            });
        </script>

        <style>
            /* Bluish Mesh Gradient Background Override */
            body {
                background-color: #e0f2fe !important;
                background-image:
                    radial-gradient(
                        at 0% 0%,
                        hsla(210, 100%, 93%, 1) 0,
                        transparent 50%
                    ),
                    radial-gradient(
                        at 50% 0%,
                        hsla(220, 100%, 85%, 1) 0,
                        transparent 50%
                    ),
                    radial-gradient(
                        at 100% 0%,
                        hsla(200, 100%, 90%, 1) 0,
                        transparent 50%
                    ),
                    radial-gradient(
                        at 0% 100%,
                        hsla(200, 100%, 92%, 1) 0,
                        transparent 50%
                    ) !important;
                background-attachment: fixed !important;
            }

            /* Tiles Mirror (Glassmorphism) Effect */
            .glass-tile {
                background: rgba(255, 255, 255, 0.45) !important;
                backdrop-filter: blur(12px) saturate(180%) !important;
                -webkit-backdrop-filter: blur(12px) saturate(180%) !important;
                border: 1px solid rgba(255, 255, 255, 0.4) !important;
                box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08) !important;
            }
        </style>

        <script>
            // Wait for DOM to ensure original classes are present
            window.addEventListener("DOMContentLoaded", () => {
                // 1. Apply glass mirror effect to the main white panels
                document.querySelectorAll(".bg-white.p-6").forEach((el) => {
                    el.classList.add("glass-tile");
                    el.classList.remove(
                        "bg-white",
                        "border-gray-100",
                        "shadow-sm",
                    );
                });

                // 2. Apply glass mirror effect to all input fields and dropdowns
                document
                    .querySelectorAll(
                        'input[type="url"], input[type="text"], input[type="email"], input[type="tel"], textarea, select',
                    )
                    .forEach((el) => {
                        el.classList.add("glass-tile");
                        el.classList.remove("border-gray-300", "bg-white");
                    });

                // 3. Make the Live Preview QR container transparent glass
                const previewBox = document.querySelector(
                    ".bg-gray-50.rounded-lg.p-4",
                );
                if (previewBox) {
                    previewBox.classList.add("glass-tile");
                    previewBox.classList.remove(
                        "bg-gray-50",
                        "border-gray-200",
                    );
                }

                // 4. Update the download button color for better contrast against the blue background
                const downloadBtnTarget =
                    document.getElementById("download-btn");
                if (downloadBtnTarget) {
                    downloadBtnTarget.classList.remove(
                        "bg-blue-600",
                        "hover:bg-blue-700",
                    );
                    downloadBtnTarget.classList.add(
                        "bg-blue-700",
                        "hover:bg-blue-800",
                        "shadow-lg",
                    );
                }
            });
        </script>
    </body>
</html>
